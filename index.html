<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Will — Commitment Contracts</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
*{font-family:'Space Grotesk',sans-serif;box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e0e;color:#f0f0f0;min-height:100vh}
.bg-glow{position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,80,50,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
.bg-glow2{position:fixed;bottom:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(255,160,0,.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.container{max-width:900px;margin:0 auto;padding:40px 24px;position:relative;z-index:1}
.header{text-align:center;margin-bottom:60px}
.logo{font-size:52px;font-weight:800;background:linear-gradient(135deg,#ff5032,#ff9f00,#ff5032);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.tagline{color:#666;font-size:18px;margin-top:8px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:48px}
.stat-box{background:#161616;border:1px solid #2a2a2a;border-radius:16px;padding:24px;text-align:center;transition:border .3s}
.stat-box:hover{border-color:#ff5032}
.stat-num{font-size:36px;font-weight:800;line-height:1}
.stat-label{color:#555;font-size:13px;margin-top:6px;font-weight:500}
.make-btn{display:block;width:100%;background:linear-gradient(135deg,#ff5032,#ff9f00);border:none;color:#fff;font-size:18px;font-weight:700;padding:18px;border-radius:14px;cursor:pointer;margin-bottom:48px;transition:transform .2s,box-shadow .2s;font-family:'Space Grotesk',sans-serif}
.make-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,80,50,.35)}
.form-box{background:#141414;border:1px solid #2a2a2a;border-radius:20px;padding:32px;margin-bottom:40px;display:none}
.form-box.open{display:block;animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.form-label{display:block;font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.form-input{background:#1e1e1e;border:1.5px solid #2a2a2a;border-radius:10px;padding:12px 16px;color:#f0f0f0;width:100%;font-size:15px;outline:none;transition:border .2s;font-family:'Space Grotesk',sans-serif}
.form-input:focus{border-color:#ff5032}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.submit-btn{background:linear-gradient(135deg,#ff5032,#ff9f00);border:none;color:#fff;font-size:16px;font-weight:700;padding:14px 32px;border-radius:10px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,80,50,.3)}
.cancel-btn{background:transparent;border:1.5px solid #2a2a2a;color:#666;font-size:15px;font-weight:600;padding:13px 24px;border-radius:10px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s;margin-left:10px}
.cancel-btn:hover{border-color:#555;color:#ccc}
.contract{background:#141414;border:1px solid #222;border-radius:18px;padding:24px;margin-bottom:16px;transition:all .3s;position:relative;overflow:hidden}
.contract::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,#ff5032,#ff9f00)}
.contract.completed::before{background:linear-gradient(180deg,#22c55e,#16a34a)}
.contract.failed::before{background:#333}
.contract:hover{border-color:#333;transform:translateX(4px)}
.progress-track{background:#1e1e1e;border-radius:4px;height:6px;margin-top:12px}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#ff5032,#ff9f00);transition:width .5s}
.penalty-tag{background:rgba(255,80,50,.1);border:1px solid rgba(255,80,50,.3);color:#ff8066;padding:3px 10px;border-radius:7px;font-size:12px;font-weight:700}
.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px}
.range-input{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:#2a2a2a;outline:none;width:100%;cursor:pointer}
.range-input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#ff5032,#ff9f00);cursor:pointer}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="container">
  <div class="header">
    <div class="logo">I Will.</div>
    <div class="tagline">Make promises. Pay when you break them. No excuses.</div>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="s-active" style="color:#ff9f00">0</div>
      <div class="stat-label">Active Contracts</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="s-done" style="color:#22c55e">0</div>
      <div class="stat-label">Kept</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="s-stake" style="color:#ff5032">€0</div>
      <div class="stat-label">At Stake</div>
    </div>
  </div>

  <button class="make-btn" onclick="toggleForm()">🔥 Make a Commitment</button>

  <div class="form-box" id="contract-form">
    <div style="font-size:20px;font-weight:800;margin-bottom:24px">New Contract ✍️</div>
    <div style="margin-bottom:16px">
      <label class="form-label">I will...</label>
      <input class="form-input" id="f-goal" placeholder="e.g. Wake up at 6:30am every day for 30 days">
    </div>
    <div class="grid-2">
      <div>
        <label class="form-label">Deadline</label>
        <input class="form-input" id="f-deadline" type="datetime-local">
      </div>
      <div>
        <label class="form-label">Penalty if I fail (€)</label>
        <input class="form-input" id="f-penalty" type="number" placeholder="25">
      </div>
    </div>
    <div class="grid-2">
      <div>
        <label class="form-label">Verification</label>
        <select class="form-input" id="f-verify">
          <option>Self-report (honor)</option>
          <option>Photo proof</option>
          <option>Friend witness</option>
          <option>App tracking</option>
        </select>
      </div>
      <div>
        <label class="form-label">Why does this matter?</label>
        <input class="form-input" id="f-why" placeholder="Your deep reason...">
      </div>
    </div>
    <div style="margin-top:20px">
      <button class="submit-btn" onclick="saveContract()">🔥 Sign Contract</button>
      <button class="cancel-btn" onclick="toggleForm()">Cancel</button>
    </div>
  </div>

  <div id="contracts-list"></div>
</div>

<script>
const SB=supabase.createClient('https://nmulrsbqdeqokvrybapn.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tdWxyc2JxZGVxb2t2cnliYXBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODY0NDcsImV4cCI6MjA5NDg2MjQ0N30.iGN_OGVkw0j3VCEi9qUroMbpT37P3UPRUf1cYyqFBys')

function toggleForm(){const f=document.getElementById('contract-form');f.classList.toggle('open')}

function timeLeft(d){if(!d)return'';const diff=new Date(d)-new Date();if(diff<0)return'<span style="color:#ff5032">EXPIRED</span>';const days=Math.floor(diff/86400000),hrs=Math.floor((diff%86400000)/3600000);if(days>0)return`<span style="color:#ff9f00">${days}d ${hrs}h left</span>`;return`<span style="color:#ff5032">${hrs}h left</span>`}

async function seedData(){
  const{data}=await SB.from('iwill_contracts').select('id').limit(1)
  if(data?.length)return
  await SB.from('iwill_contracts').insert([
    {goal:'Study English 1 hour every day',deadline:new Date(Date.now()+15*86400000).toISOString(),penalty:20,verify_method:'Self-report (honor)',motivation:'I want to move abroad',status:'active',progress:60},
    {goal:'Go to the gym 4 times this week',deadline:new Date(Date.now()+4*86400000).toISOString(),penalty:15,verify_method:'Photo proof',motivation:'I want to feel stronger',status:'active',progress:75},
    {goal:'Read one book this month',deadline:new Date(Date.now()+22*86400000).toISOString(),penalty:10,verify_method:'Self-report (honor)',motivation:'Knowledge is power',status:'active',progress:40},
    {goal:'No social media before 9am for 2 weeks',deadline:new Date(Date.now()-2*86400000).toISOString(),penalty:5,verify_method:'Honor system',motivation:'Morning focus',status:'completed',progress:100},
  ])
}

async function saveContract(){
  const d={goal:document.getElementById('f-goal').value,deadline:document.getElementById('f-deadline').value||null,penalty:parseFloat(document.getElementById('f-penalty').value)||0,verify_method:document.getElementById('f-verify').value,motivation:document.getElementById('f-why').value,status:'active',progress:0}
  if(!d.goal)return
  await SB.from('iwill_contracts').insert(d)
  toggleForm();document.getElementById('f-goal').value='';document.getElementById('f-penalty').value='';loadContracts()
}

async function updateProgress(id,val){
  const p=parseInt(val),status=p>=100?'completed':'active'
  await SB.from('iwill_contracts').update({progress:p,status}).eq('id',id)
  loadContracts()
}

async function markFailed(id){
  if(!confirm('Mark as failed?'))return
  await SB.from('iwill_contracts').update({status:'failed'}).eq('id',id)
  loadContracts()
}

async function loadContracts(){
  const{data}=await SB.from('iwill_contracts').select('*').order('created_at',{ascending:false})
  const list=document.getElementById('contracts-list')
  if(!data?.length){list.innerHTML='<div style="text-align:center;color:#444;padding:60px">Nothing committed yet. What are you waiting for?</div>';return}
  const active=data.filter(c=>c.status==='active')
  const done=data.filter(c=>c.status==='completed')
  const stake=active.reduce((s,c)=>s+(c.penalty||0),0)
  document.getElementById('s-active').textContent=active.length
  document.getElementById('s-done').textContent=done.length
  document.getElementById('s-stake').textContent='€'+stake
  list.innerHTML=data.map(c=>`
    <div class="contract ${c.status}">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span class="status-dot" style="background:${c.status==='active'?'#ff9f00':c.status==='completed'?'#22c55e':'#444'}"></span>
            <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:${c.status==='active'?'#ff9f00':c.status==='completed'?'#22c55e':'#555'}">${c.status}</span>
            ${c.penalty?`<span class="penalty-tag">€${c.penalty} at stake</span>`:''}
          </div>
          <div style="font-size:19px;font-weight:700;line-height:1.3;margin-bottom:6px">"I will ${c.goal}"</div>
          ${c.motivation?`<div style="font-size:13px;color:#555;margin-bottom:8px;font-style:italic">"${c.motivation}"</div>`:''}
          <div style="display:flex;gap:16px;font-size:12px;color:#555">
            ${c.deadline?`<span>${timeLeft(c.deadline)}</span>`:''}
            <span>✓ ${c.verify_method}</span>
          </div>
        </div>
        <button onclick="this.closest('.contract').remove();SB.from('iwill_contracts').delete().eq('id','${c.id}').then(()=>loadContracts())" style="background:none;border:none;color:#333;cursor:pointer;font-size:16px;padding:4px">✕</button>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${c.progress||0}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <span style="font-size:12px;color:#555">Progress: <strong style="color:${(c.progress||0)>=100?'#22c55e':'#ff9f00'}">${c.progress||0}%</strong></span>
        ${c.status==='active'?`<div style="display:flex;align-items:center;gap:10px">
          <input type="range" class="range-input" style="width:140px" min="0" max="100" value="${c.progress||0}" onchange="updateProgress('${c.id}',this.value)">
          <button onclick="markFailed('${c.id}')" style="background:rgba(255,80,50,.1);border:1px solid rgba(255,80,50,.3);color:#ff8066;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit">Failed</button>
        </div>`:''}
      </div>
    </div>`).join('')
}

async function init(){await seedData();loadContracts()}
init()
</script>
</body>
</html>
